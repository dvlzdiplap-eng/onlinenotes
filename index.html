<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nepal CollabNote Pro</title>
    
    <!-- External Dependencies -->
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a; --sidebar: #1e293b; --accent: #6366f1;
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155;
            --glass: rgba(30, 41, 59, 0.7); --danger: #ef4444; --success: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: thin; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- AUTH & SETUP OVERLAY --- */
        #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .auth-card { background: var(--sidebar); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; }
        .pro-input { width: 100%; padding: 12px; background: #0b0f1a; border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; }
        .pro-input:focus { border-color: var(--accent); }
        .pro-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .pro-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* --- SIDEBAR --- */
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); }
        .user-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        
        .nav-section { flex: 1; overflow-y: auto; padding: 20px; }
        .section-title { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .group-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; color: var(--text-dim); transition: 0.2s; }
        .group-item:hover, .group-item.active { background: rgba(99, 102, 241, 0.1); color: var(--accent); }
        .group-item.active { background: var(--accent); color: white; }

        /* --- MAIN WORKSPACE --- */
        .workspace { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .top-bar { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--glass); }
        .room-meta h2 { margin: 0; font-size: 1.2rem; }
        .sync-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #22c55e; color: #22c55e; }

        .editor-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        .editor-main { flex: 1; overflow-y: auto; padding: 40px 60px; line-height: 1.7; outline: none; font-size: 1.1rem; color: #cbd5e1; }
        .editor-main:empty:before { content: "Click the + button to add blocks or start typing..."; color: #475569; }

        /* Split Screen (Friend's View) */
        .collab-pane { width: 0; background: #0a0f1d; border-left: 1px solid var(--border); overflow-y: auto; transition: 0.5s; position: relative; }
        .collab-pane.active { width: 40%; }
        .collab-header { padding: 15px; background: rgba(0,0,0,0.2); font-size: 12px; color: var(--accent); position: sticky; top: 0; }
        .collab-content { padding: 20px; opacity: 0.6; pointer-events: none; }

        /* --- BLOCKS --- */
        .code-block { background: #000; border-radius: 12px; margin: 25px 0; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .code-header { background: #1a1a1a; padding: 8px 15px; font-family: 'Fira Code', monospace; font-size: 11px; color: #666; display: flex; justify-content: space-between; }
        .copy-btn { color: var(--accent); cursor: pointer; font-weight: 600; }
        .code-area { padding: 20px; font-family: 'Fira Code', monospace; font-size: 14px; color: #94a3b8; white-space: pre-wrap; }
        
        img { max-width: 100%; border-radius: 12px; margin: 20px 0; border: 1px solid var(--border); }
        .highlight { background: rgba(99, 102, 241, 0.3); padding: 2px 5px; border-radius: 4px; }

        /* --- FLOATING ACTION BUTTON --- */
        .fab-root { position: fixed; bottom: 35px; right: 35px; z-index: 1000; }
        .fab-main { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 28px; cursor: pointer; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .fab-main:hover { transform: scale(1.1) rotate(90deg); }
        .fab-menu { position: absolute; bottom: 80px; right: 0; background: var(--sidebar); border: 1px solid var(--border); border-radius: 15px; width: 220px; padding: 12px; display: none; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .fab-menu.active { display: flex; animation: slideUp 0.3s ease; }
        .menu-item { padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .menu-item:hover { background: #0f172a; color: var(--accent); }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- MOBILE LAYOUT --- */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -300px; z-index: 2000; height: 100%; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
            .sidebar.open { left: 0; }
            .editor-main { padding: 25px; }
            .collab-pane.active { position: fixed; right: 0; width: 100%; height: 30%; bottom: 0; z-index: 1500; }
            .top-bar { padding: 0 15px; }
            .menu-btn { display: block !important; }
        }
    </style>
</head>
<body>

    <!-- AUTH SECTION -->
    <div id="authOverlay">
        <div class="auth-card">
            <div class="auth-title">Nepal Collab Pro</div>
            <p style="text-align: center; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 30px;">Initialize your professional profile</p>
            <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="setupName" class="pro-input" placeholder="e.g., Arun_Swoyambhu">
            </div>
            <div class="input-group">
                <label>Recovery Key (Favorite Name)</label>
                <input type="password" id="setupKey" class="pro-input" placeholder="Secret word for login">
            </div>
            <button class="pro-btn" onclick="saveProfile()">Start Writing</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="mainSidebar">
        <div class="sidebar-header">
            <div class="user-profile">
                <div class="avatar" id="userInitial">?</div>
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;" id="uName">Guest</div>
                    <div style="font-size: 0.7rem; color: var(--text-dim);">Profile Active</div>
                </div>
            </div>
        </div>
        <div class="nav-section">
            <div class="section-title">
                Permanent Groups
                <button onclick="createGroup()" style="background:none; border:none; color:var(--accent); cursor:pointer;">+</button>
            </div>
            <div id="groupList">
                <!-- Loaded Dynamically -->
            </div>
        </div>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <button class="pro-btn" style="background: #1e293b; border: 1px solid var(--border);" onclick="copyInvite()">Invite Collaborator</button>
        </div>
    </aside>

    <!-- WORKSPACE -->
    <main class="workspace">
        <header class="top-bar">
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="menu-btn" onclick="toggleSidebar()" style="display:none; background:none; border:none; color:white; font-size:24px;">☰</button>
                <div class="room-meta">
                    <h2 id="activeRoomName"># General</h2>
                </div>
            </div>
            <div id="syncStatus" class="sync-badge">CONNECTED</div>
        </header>

        <div class="editor-container">
            <!-- ME -->
            <div class="editor-main" id="editor" contenteditable="true" spellcheck="false"></div>
            
            <!-- FRIEND (SPLIT SCREEN) -->
            <div class="collab-pane" id="splitPane">
                <div class="collab-header">
                    <span id="friendName">... is typing</span>
                </div>
                <div class="collab-content" id="friendView"></div>
            </div>
        </div>
    </main>

    <!-- FAB -->
    <div class="fab-root">
        <div class="fab-menu" id="plusMenu">
            <div class="menu-item" onclick="addCodeBlock()"><span>💻</span> Add Code Block</div>
            <div class="menu-item" onclick="document.getElementById('fileInp').click()"><span>🖼️</span> Upload Media</div>
            <div class="menu-item" onclick="applyTextFormat('highlight')"><span>🖍️</span> Highlight Text</div>
            <div class="menu-item" onclick="applyTextFormat('bold')"><span><b>B</b></span> Make Bold</div>
        </div>
        <button class="fab-main" onclick="toggleFAB()">+</button>
    </div>

    <input type="file" id="fileInp" hidden accept="image/*,video/*">

    <script>
        // 1. CONFIG & DB
        const CONFIG = {
            URL: 'https://ycnmgtdxljncunnktbef.supabase.co',
            KEY: 'sb_publishable_ic4z42pOnv3_DNfgt4GvJg_d-E1CPVV',
            TABLE: 'shared_notes'
        };
        const sb = supabase.createClient(CONFIG.URL, CONFIG.KEY);

        // 2. STATE
        let USER = JSON.parse(localStorage.getItem('pro_profile'));
        let ROOM = new URLSearchParams(window.location.search).get('room') || 'General';
        let syncTimer;

        // 3. AUTH LOGIC
        function checkProfile() {
            if(!USER) {
                document.getElementById('authOverlay').style.display = 'flex';
            } else {
                initApp();
            }
        }

        function saveProfile() {
            const name = document.getElementById('setupName').value;
            const key = document.getElementById('setupKey').value;
            if(name && key) {
                USER = { name, key };
                localStorage.setItem('pro_profile', JSON.stringify(USER));
                location.reload();
            }
        }

        // 4. GROUP MANAGEMENT
        async function loadGroups() {
            const { data } = await sb.from(CONFIG.TABLE).select('room_name');
            const list = document.getElementById('groupList');
            list.innerHTML = "";
            data.forEach(g => {
                const div = document.createElement('div');
                div.className = `group-item ${g.room_name === ROOM ? 'active' : ''}`;
                div.innerHTML = `<span># ${g.room_name}</span>`;
                div.onclick = () => switchRoom(g.room_name);
                list.appendChild(div);
            });
        }

        async function createGroup() {
            const name = prompt("Enter Permanent Group Name:");
            if(name) {
                const cleanName = name.replace(/\s+/g, '_');
                await sb.from(CONFIG.TABLE).insert({ room_name: cleanName, content: '', updated_by: USER.name });
                switchRoom(cleanName);
            }
        }

        function switchRoom(name) {
            window.location.search = `?room=${name}`;
        }

        // 5. EDITOR & REALTIME
        async function initApp() {
            document.getElementById('uName').innerText = USER.name;
            document.getElementById('userInitial').innerText = USER.name[0].toUpperCase();
            document.getElementById('activeRoomName').innerText = "# " + ROOM;
            
            loadGroups();

            // Load Initial Content
            const { data } = await sb.from(CONFIG.TABLE).select('content').eq('room_name', ROOM).single();
            if(data) document.getElementById('editor').innerHTML = data.content;

            // Subscribe to remote changes
            sb.channel(ROOM)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: CONFIG.TABLE, filter: `room_name=eq.${ROOM}` }, payload => {
                if(payload.new.updated_by !== USER.name) {
                    updateSplitScreen(payload.new.updated_by, payload.new.content);
                }
            }).subscribe();
        }

        // Syncing (Debounced)
        document.getElementById('editor').addEventListener('input', () => {
            document.getElementById('syncStatus').innerText = "SYNCING...";
            document.getElementById('syncStatus').style.color = "var(--accent)";
            
            clearTimeout(syncTimer);
            syncTimer = setTimeout(async () => {
                await sb.from(CONFIG.TABLE).upsert({
                    room_name: ROOM,
                    content: document.getElementById('editor').innerHTML,
                    updated_by: USER.name,
                    updated_at: new Date()
                });
                document.getElementById('syncStatus').innerText = "CONNECTED";
                document.getElementById('syncStatus').style.color = "#22c55e";
            }, 1500);
        });

        // 6. UI INTERACTIONS
        function toggleSidebar() { document.getElementById('mainSidebar').classList.toggle('open'); }
        function toggleFAB() { document.getElementById('plusMenu').classList.toggle('active'); }

        function updateSplitScreen(name, content) {
            const pane = document.getElementById('splitPane');
            document.getElementById('friendName').innerText = `${name} is collaborating...`;
            document.getElementById('friendView').innerHTML = content;
            pane.classList.add('active');
            
            clearTimeout(window.splitHide);
            window.splitHide = setTimeout(() => pane.classList.remove('active'), 8000);
        }

        function copyInvite() {
            const url = window.location.href;
            navigator.clipboard.writeText(url);
            alert("Invite link copied! Send it to your friend.");
        }

        // 7. BLOCK ACTIONS
        function addCodeBlock() {
            const code = prompt("Paste your code snippet:");
            if(!code) return;
            const html = `
                <div class="code-block" contenteditable="false">
                    <div class="code-header"><span>SOURCE CODE</span><span class="copy-btn" onclick="copyCode(this)">COPY</span></div>
                    <div class="code-area">${code}</div>
                </div><p><br></p>`;
            document.execCommand('insertHTML', false, html);
            toggleFAB();
        }

        function applyTextFormat(type) {
            if(type === 'highlight') document.execCommand('backColor', false, '#4f46e5');
            else document.execCommand(type, false, null);
            toggleFAB();
        }

        document.getElementById('fileInp').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const tag = `<img src="${ev.target.result}"><p><br></p>`;
                document.execCommand('insertHTML', false, tag);
                toggleFAB();
            }
            reader.readAsDataURL(file);
        };

        function copyCode(btn) {
            const txt = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(txt);
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        }

        // Init
        checkProfile();
    </script>
</body>
</html>
