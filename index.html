<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nepal Collab Pro</title>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a; --sidebar: #1e293b; --accent: #6366f1;
            --text: #f8fafc; --border: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar - Permanent Groups */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 20px; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .group-list { flex: 1; overflow-y: auto; padding: 10px; }
        .group-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; font-size: 0.9rem; }
        .group-item:hover, .group-item.active { background: var(--accent); color: white; }

        /* Main Content Area */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg); }
        .header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }

        /* Note Editor */
        .editor-container { flex: 1; display: flex; overflow: hidden; }
        .editor-pane { flex: 1; padding: 40px; overflow-y: auto; line-height: 1.6; font-size: 1.1rem; outline: none; }
        .editor-pane:empty:before { content: "Start typing your note..."; color: #64748b; }

        /* Split Screen Logic */
        .split-pane { border-left: 1px solid var(--border); background: #0b0f1a; display: none; }
        .split-pane.active { display: block; flex: 1; padding: 40px; }

        /* Floating + Button */
        .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 100; }
        .fab { width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .plus-menu { position: absolute; bottom: 70px; right: 0; background: var(--sidebar); border: 1px solid var(--border); border-radius: 12px; display: none; flex-direction: column; width: 200px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .plus-menu.show { display: flex; }
        .menu-item { padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: var(--bg); }

        /* Code Block Styling */
        .code-block { background: #111; border-radius: 8px; margin: 20px 0; border: 1px solid var(--border); position: relative; }
        .code-header { background: #222; padding: 5px 15px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; font-size: 12px; color: #888; }
        .code-content { padding: 15px; font-family: 'Fira Code', monospace; font-size: 14px; overflow-x: auto; color: #58a6ff; white-space: pre; }
        .copy-btn { cursor: pointer; color: var(--accent); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; z-index: 1000; height: 100%; }
            .sidebar.open { left: 0; }
            .editor-pane { padding: 20px; font-size: 1rem; }
            .split-pane.active { display: none; } /* Hide split on mobile for focus */
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>MY GROUPS</span>
            <button onclick="createNewGroup()" style="background:none; border:none; color:white; cursor:pointer;">+</button>
        </div>
        <div class="group-list" id="groupList">
            <!-- Groups will load here -->
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="header">
            <button id="menuToggle" onclick="toggleSidebar()" style="display:none; background:none; border:none; color:white; font-size:20px;">☰</button>
            <div id="activeGroupName" style="font-weight: 600;">Loading...</div>
            <div id="collaboratorStatus" style="font-size: 12px; color: #22c55e;"></div>
        </header>

        <div class="editor-container">
            <!-- My Workspace -->
            <div class="editor-pane" id="noteEditor" contenteditable="true"></div>
            
            <!-- Friend's View (Split Screen) -->
            <div class="split-pane" id="friendPane">
                <div style="font-size: 12px; color: var(--accent); margin-bottom: 10px;" id="friendName">Friend typing...</div>
                <div id="friendContent" style="opacity: 0.7;"></div>
            </div>
        </div>
    </div>

    <!-- Floating Actions -->
    <div class="fab-container">
        <div class="plus-menu" id="plusMenu">
            <div class="menu-item" onclick="insertCodeBlock()">💻 Add Code Block</div>
            <div class="menu-item" onclick="triggerImageUpload()">🖼️ Upload Image</div>
            <div class="menu-item" onclick="applyHighlight()">🖍️ Highlight Text</div>
        </div>
        <button class="fab" onclick="togglePlusMenu()">+</button>
    </div>

    <input type="file" id="imgInput" hidden accept="image/*">

    <script>
        // CONFIG
        const CONFIG = {
            URL: 'https://ycnmgtdxljncunnktbef.supabase.co',
            KEY: 'sb_publishable_ic4z42pOnv3_DNfgt4GvJg_d-E1CPVV',
            TABLE: 'shared_notes'
        };

        const supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);
        let currentRoom = localStorage.getItem('lastRoom') || 'General';
        let myName = localStorage.getItem('userName') || prompt("Your Name:");
        localStorage.setItem('userName', myName);

        // INITIALIZE
        async function init() {
            loadGroups();
            joinRoom(currentRoom);
            
            // Handle Mobile Toggle visibility
            if(window.innerWidth < 768) document.getElementById('menuToggle').style.display = 'block';
        }

        // ROOM LOGIC
        async function joinRoom(roomName) {
            currentRoom = roomName;
            localStorage.setItem('lastRoom', roomName);
            document.getElementById('activeGroupName').innerText = "# " + roomName;
            
            // Load Initial Data
            const { data } = await supabase.from(CONFIG.TABLE).select('content').eq('room_name', roomName).single();
            document.getElementById('noteEditor').innerHTML = data ? data.content : "";

            // Subscribe to real-time
            supabase.channel(roomName)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: CONFIG.TABLE, filter: `room_name=eq.${roomName}` }, payload => {
                if (payload.new.updated_by !== myName) {
                    showFriendAction(payload.new.updated_by, payload.new.content);
                }
            }).subscribe();
        }

        // SYNC DATA
        let syncTimeout;
        document.getElementById('noteEditor').addEventListener('input', () => {
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                await supabase.from(CONFIG.TABLE).upsert({
                    room_name: currentRoom,
                    content: document.getElementById('noteEditor').innerHTML,
                    updated_by: myName,
                    updated_at: new Date()
                }, { onConflict: 'room_name' });
            }, 1000);
        });

        // SPLIT SCREEN LOGIC
        function showFriendAction(name, content) {
            const pane = document.getElementById('friendPane');
            const friendContent = document.getElementById('friendContent');
            const friendLabel = document.getElementById('friendName');
            
            pane.classList.add('active');
            friendLabel.innerText = name + " is typing...";
            friendContent.innerHTML = content;

            // Auto-hide split screen after 10 seconds of inactivity
            clearTimeout(window.splitTimeout);
            window.splitTimeout = setTimeout(() => {
                pane.classList.remove('active');
            }, 10000);
        }

        // PLUS MENU TOOLS
        function togglePlusMenu() { document.getElementById('plusMenu').classList.toggle('show'); }
        
        function insertCodeBlock() {
            const code = prompt("Paste your code here:");
            if(!code) return;
            const block = `
                <div class="code-block" contenteditable="false">
                    <div class="code-header"><span>CODE</span><span class="copy-btn" onclick="copyCode(this)">Copy</span></div>
                    <div class="code-content">${code}</div>
                </div><p><br></p>`;
            document.execCommand('insertHTML', false, block);
            togglePlusMenu();
        }

        function triggerImageUpload() { document.getElementById('imgInput').click(); }
        
        document.getElementById('imgInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = `<img src="${event.target.result}" style="max-width:100%; border-radius:10px;"><p><br></p>`;
                document.execCommand('insertHTML', false, img);
            };
            reader.readAsDataURL(e.target.files[0]);
            togglePlusMenu();
        };

        function applyHighlight() {
            document.execCommand('backColor', false, '#475569');
            togglePlusMenu();
        }

        // UI HELPERS
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        
        function copyCode(btn) {
            const text = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(text);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        async function createNewGroup() {
            const name = prompt("Enter new Group Name:");
            if(name) {
                await supabase.from('shared_notes').insert({ room_name: name, content: '', updated_by: myName });
                loadGroups();
            }
        }

        async function loadGroups() {
            const { data } = await supabase.from(CONFIG.TABLE).select('room_name');
            const list = document.getElementById('groupList');
            list.innerHTML = "";
            data.forEach(g => {
                const item = document.createElement('div');
                item.className = `group-item ${g.room_name === currentRoom ? 'active' : ''}`;
                item.innerText = "# " + g.room_name;
                item.onclick = () => { joinRoom(g.room_name); loadGroups(); if(window.innerWidth < 768) toggleSidebar(); };
                list.appendChild(item);
            });
        }

        init();
    </script>
</body>
</html>
